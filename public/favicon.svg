<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="150" height="150">
  <style>
    .pulse-line {
      fill: none;
      stroke: #7c0404; /* 提取的原图深红色 */
      stroke-width: 9;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* 动画核心属性 */
      stroke-dasharray: 250;
      stroke-dashoffset: 250;
      animation: draw-pulse 2.5s ease-in-out infinite;
    }

    @keyframes draw-pulse {
      0% {
        stroke-dashoffset: 250;
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      50% {
        stroke-dashoffset: 0;
      }
      80% {
        opacity: 1;
      }
      100% {
        stroke-dashoffset: -250;
        opacity: 0;
      }
    }
  </style>
  
  <!-- 匹配原图轨迹的矢量路径 -->
  <path class="pulse-line" d="M 10 50 L 28 50 L 38 12 L 62 88 L 72 50 L 90 50" />
</svg>
